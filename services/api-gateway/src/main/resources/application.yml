server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**
        - id: chat-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/chat/**
        - id: quiz-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/quiz/**, /api/vocabulary/**
        - id: ai-orchestrator
          uri: http://localhost:8084
          predicates:
            - Path=/api/ai/**
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
