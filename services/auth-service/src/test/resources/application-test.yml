spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false

jwt:
  secret: test-secret-key-that-is-at-least-256-bits-long-for-hs256-algorithm
  expiration: 86400000
  refresh-expiration: 604800000

oauth2:
  google:
    client-id: test-google-client-id
    client-secret: test-google-client-secret
    token-endpoint: https://oauth2.googleapis.com/token
    user-info-endpoint: https://www.googleapis.com/oauth2/v2/userinfo
    redirect-uri: http://localhost:8081/api/auth/oauth2/callback/google
  github:
    client-id: test-github-client-id
    client-secret: test-github-client-secret
    token-endpoint: https://api.github.com/login/oauth/access_token
    user-info-endpoint: https://api.github.com/user
    redirect-uri: http://localhost:8081/api/auth/oauth2/callback/github
