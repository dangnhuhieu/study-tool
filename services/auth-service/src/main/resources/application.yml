server:
  port: 8081

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:studytool_auth}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: ${JWT_SECRET:change-me-in-production}
  expiration: 86400000  # 24 hours
  refresh-expiration: 604800000  # 7 days

oauth2:
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
    client-secret: ${GOOGLE_CLIENT_SECRET:}
    token-endpoint: https://oauth2.googleapis.com/token
    user-info-endpoint: https://www.googleapis.com/oauth2/v2/userinfo
    redirect-uri: http://localhost:8081/api/auth/oauth2/callback/google
  github:
    client-id: ${GITHUB_CLIENT_ID:}
    client-secret: ${GITHUB_CLIENT_SECRET:}
    token-endpoint: https://api.github.com/login/oauth/access_token
    user-info-endpoint: https://api.github.com/user
    redirect-uri: http://localhost:8081/api/auth/oauth2/callback/github

management:
  endpoints:
    web:
      exposure:
        include: health,info
