version: '3.8'

services:
  # ========================
  # Infrastructure
  # ========================
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-databases.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 10s
      retries: 5

  # ========================
  # Java Services
  # ========================
  api-gateway:
    build: ./services/api-gateway
    ports:
      - "8080:8080"
    environment:
      REDIS_HOST: redis
    depends_on:
      redis:
        condition: service_healthy

  auth-service:
    build: ./services/auth-service
    ports:
      - "8081:8081"
    environment:
      DB_HOST: postgres
      DB_NAME: studytool_auth
      JWT_SECRET: dev-secret-change-in-production
    depends_on:
      postgres:
        condition: service_healthy

  chat-service:
    build: ./services/chat-service
    ports:
      - "8082:8082"
    environment:
      DB_HOST: postgres
      DB_NAME: studytool_chat
      RABBITMQ_HOST: rabbitmq
      AI_ORCHESTRATOR_HOST: ai-orchestrator
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  quiz-service:
    build: ./services/quiz-service
    ports:
      - "8083:8083"
    environment:
      DB_HOST: postgres
      DB_NAME: studytool_quiz
      RABBITMQ_HOST: rabbitmq
      EMBEDDING_SERVICE_HOST: embedding-service
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  ai-orchestrator:
    build: ./services/ai-orchestrator-service
    ports:
      - "8084:8084"
    environment:
      REDIS_HOST: redis
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      EMBEDDING_SERVICE_HOST: embedding-service
      SPEECH_SERVICE_HOST: speech-service
      EVALUATION_SERVICE_HOST: evaluation-service
    depends_on:
      redis:
        condition: service_healthy

  # ========================
  # Python AI Services
  # ========================
  embedding-service:
    build: ./ai-services/embedding
    ports:
      - "8090:8090"
    environment:
      EMBEDDING_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/studytool_embedding
    depends_on:
      postgres:
        condition: service_healthy

  speech-service:
    build: ./ai-services/speech
    ports:
      - "8091:8091"

  evaluation-service:
    build: ./ai-services/evaluation
    ports:
      - "8092:8092"
    environment:
      EVALUATION_CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}

  # ========================
  # Frontend
  # ========================
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway

volumes:
  postgres-data:
