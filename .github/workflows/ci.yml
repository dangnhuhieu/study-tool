name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  java-build:
    name: Build Java Services
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean install -DskipTests

      - name: Run tests
        run: mvn test

  python-build:
    name: Build Python AI Services
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [speech, embedding, evaluation]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: ai-services/${{ matrix.service }}/requirements.txt

      - name: Install dependencies
        run: |
          cd ai-services/${{ matrix.service }}
          pip install -r requirements.txt

      - name: Run tests
        run: |
          cd ai-services/${{ matrix.service }}
          python -m pytest --tb=short -q || true

  frontend-build:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Lint
        run: cd frontend && npm run lint

      - name: Build
        run: cd frontend && npm run build

      - name: Test
        run: cd frontend && npm test -- --run || true

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [java-build, python-build, frontend-build]
    if: github.event_name == 'push'
    strategy:
      matrix:
        include:
          - service: services/api-gateway
            image: study-tool/api-gateway
          - service: services/auth-service
            image: study-tool/auth-service
          - service: services/chat-service
            image: study-tool/chat-service
          - service: services/quiz-service
            image: study-tool/quiz-service
          - service: services/ai-orchestrator-service
            image: study-tool/ai-orchestrator
          - service: ai-services/speech
            image: study-tool/speech-service
          - service: ai-services/embedding
            image: study-tool/embedding-service
          - service: ai-services/evaluation
            image: study-tool/evaluation-service
          - service: frontend
            image: study-tool/frontend
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ${{ matrix.image }}:${{ github.sha }} ./${{ matrix.service }}
